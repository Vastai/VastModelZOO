name: PP-LCNet_x1_0_doc_ori_infer_inference_sim_vacc_int8_mse

frontend:
  shape:
    x:
      - 1
      - 3
      - 224
      - 224
  type: onnx
  checkpoint: PP-LCNet_x1_0_doc_ori_infer_inference_sim.onnx

backend:
  type: tvm_vacc
  dtype: int8

  compile:
    data_transport_mode: 1

  quantize:
    calibrate_mode: mse
    quantize_per_channel: true

dataset:
  type: tvm
  path: datasets/text_image_orientation/images
  sampler:
    suffix: jpg
    get_data_num: 1000

  process_ops:
  - type: DecodeImage
  # - type: Resize
  #   size:
  #   - 256
  #   - 256
  # - type: CenterCrop
  #   crop_size:
  #   - 224
  #   - 224
  - type: Resize
    size:
    - 224
    - 224
  - type: Normalize
    div255: true
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
  - type: ToTensor

workspace:
  path: deploy_weights
