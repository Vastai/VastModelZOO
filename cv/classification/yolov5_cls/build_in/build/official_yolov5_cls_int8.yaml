name: official_yolov5m_cls_int8

frontend:
  checkpoint: /path/to/yolov5m-cls.onnx
  shape:
    images: [1, 3, 256, 256]
  type: onnx
  dtype: fp32

backend:
  type: tvm_vacc
  dtype: int8
  compile:
    cluster_mode: 0
  quantize:
    calibrate_mode: max
    quantize_per_channel: true

dataset:
  type: tvm
  path: /path/to/ILSVRC2012_img_calib
  sampler:
    suffix: JPEG
    get_data_num: 100
  process_ops:
  - type: DecodeImage
  - type: Resize
    size:
    - 256
    - 256
  - type: CenterCrop
    crop_size:
    - 224
    - 224
  - type: Normalize
    mean:
    - 0.485
    - 0.456
    - 0.406
    std:
    - 0.229
    - 0.224
    - 0.225
  - type: ToTensor

workspace:
  path: ./deploy_weights/

