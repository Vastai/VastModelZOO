name: PP-LCNet_x1_0_textline_ori_infer_inference_sim_vacc_int8_kl_divergence

frontend:
  shape:
    x:
      - 1
      - 3
      - 80
      - 160
  type: onnx
  checkpoint: weights/PP-LCNet_x1_0_textline_ori_infer_inference_sim.onnx
  dtype: fp32

backend:
  type: tvm_vacc
  dtype: fp16

  compile:
    data_transport_mode: 1

  quantize:
    calibrate_mode: kl_divergence
    quantize_per_channel: true

dataset:
  type: tvm
  path: datasets/textline_orientation_example_data/images
  sampler:
    suffix: jpg
    get_data_num: 1000
  process_ops:
  - type: DecodeImage
  - type: Resize
    size:
    - 80
    - 160
  - type: Normalize
    div255: true
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
  - type: ToTensor

workspace:
  path: deploy_weights
