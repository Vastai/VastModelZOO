name: PP-OCRv5_mobile_rec_infer_fp16_320

frontend:
  shape:
    x:
      - 1
      - 3
      - 48
      - 320
  type: onnx
  checkpoint: PP-OCRv5_mobile_rec_infer_inference_sim.onnx
  dtype: fp32

backend:
  type: tvm_vacc
  dtype: fp16

  compile:
    data_type: 0
    opt_level: 2
    data_transport_mode: 1
    mem_inplace: true

  quantize:
    calibrate_mode: percentile
    quantize_per_channel: true
    calibrate_chunk_by: -1

dataset:
  type: tvm
  path: text_rec_test_dataset/data/test
  sampler:
    suffix: png
    get_data_num: 50
  process_ops:
  - type: DecodeImage
  - type: Resize
    size:
    - 48
    - 320
  - type: Normalize
    div255: true
    mean:
    - 0.5
    - 0.5
    - 0.5
    std:
    - 0.5
    - 0.5
    - 0.5
  - type: ToTensor

workspace:
  path: deploy_weights
  env_recheck: false

