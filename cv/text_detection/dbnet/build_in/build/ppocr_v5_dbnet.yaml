name: PP-OCRv5_mobile_det_infer_fp16_960

frontend:
  checkpoint: PP-OCRv5_mobile_det_infer_inference_sim.onnx
  shape:
    x: [1, 3, 960, 960]
  type: onnx
  dtype: fp32

backend:
  type: tvm_vacc
  dtype: fp16
  compile:
    data_type: 0
    opt_level: 2
    data_transport_mode: 1
    enable_float_to_half: true
  quantize:
    calibrate_mode: percentile
    quantize_per_channel: true
    calibrate_chunk_by: -1

dataset:
  type: tvm
  path: text_det_test_dataset/data/test
  sampler:
    suffix: jpg
    get_data_num: 50
  process_ops: 
    - type: DecodeImage
    - type: Resize
      size: [960, 960]
    - type: Normalize
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
    - type: ToTensor

workspace:
  path: deploy_weights
  env_recheck: false
